# ordinal-agents — agent-0 only. Bridge runs inside agent-0 (no separate service).
# Build:  docker compose build agent-base && docker compose build agent-0
# Up:     docker compose up -d agent-0
# .env:   ANTHROPIC_API_KEY=sk-ant-api03-...  and optionally CC_WEB_AUTH=<token>
# Web UI: http://localhost:32350/?token=agent0  (or your CC_WEB_AUTH value)

services:
  agent-base:
    build:
      context: .
      dockerfile: Dockerfile.base
    image: agent-base:latest
    profiles:
      - build-only

  agent-0:
    image: agent-0:latest
    build:
      context: .
      dockerfile: 0/Dockerfile
    container_name: agent-0
    hostname: agent-0
    env_file: .env
    environment:
      - BRIDGE_URL=http://localhost:32360
    ports:
      - "32350:32350"
    volumes:
      - .:/repo-src:ro
      - agent-0-workspace:/home/claude/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - agent-0-config:/home/claude/.claude
      - agent-0-config-dotconfig:/home/claude/.config
    restart: unless-stopped
    # Use "docker compose down" without -v so login and config persist across restarts

volumes:
  agent-0-workspace:
  agent-0-config:
  agent-0-config-dotconfig:
