services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ordinal-agent
    hostname: ordinal-agent
    privileged: true
    env_file: .env
    ports:
      - "127.0.0.1:${AGENT_BASE_PORT:-3000}-${AGENT_BASE_PORT_END:-3020}:${AGENT_BASE_PORT:-3000}-${AGENT_BASE_PORT_END:-3020}"
    volumes:
      - agent-workspace:/home/claude/workspace
      - agent-config:/home/claude/.claude
      - docker-data:/var/lib/docker
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ordinal-webui
    depends_on:
      - agent
    ports:
      - "127.0.0.1:${OPEN_WEBUI_PORT:-3080}:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://ordinal-agent:4000/v1
      - OPENAI_API_KEY=${ANTHROPIC_API_KEY}
      - ENABLE_OLLAMA_API=False
      - WEBUI_AUTH=True
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL:-admin@example.com}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD:-changeme}
      - WEBUI_NAME=Ordinal Agents
    restart: unless-stopped

  caddy:
    build: ./caddy
    container_name: ordinal-caddy
    profiles: ["vps"]
    depends_on:
      - authelia
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    env_file: .env
    restart: unless-stopped

  authelia:
    image: authelia/authelia:latest
    container_name: ordinal-authelia
    profiles: ["vps"]
    volumes:
      - ./authelia:/config:ro
      - authelia-data:/data
    env_file: .env
    restart: unless-stopped

volumes:
  agent-workspace:
  agent-config:
  docker-data:
  open-webui-data:
  caddy-data:
  caddy-config:
  authelia-data:
