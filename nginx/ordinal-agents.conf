# Ordinal Agents — nginx reverse proxy
# 1. Copy to /etc/nginx/sites-available/ordinal-agents.conf
# 2. Replace AGENT_DOMAIN with your actual domain (e.g. agent.yourdomain.com)
# 3. ln -s /etc/nginx/sites-available/ordinal-agents.conf /etc/nginx/sites-enabled/
# 4. sudo certbot --nginx -d AGENT_DOMAIN -d '*.AGENT_DOMAIN'

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Subagent ID → port map (5000 + N)
map $subid $subagent_port {
    1  5001;
    2  5002;
    3  5003;
    4  5004;
    5  5005;
    6  5006;
    7  5007;
    8  5008;
    9  5009;
    10 5010;
    11 5011;
    12 5012;
    13 5013;
    14 5014;
    15 5015;
    16 5016;
    17 5017;
    18 5018;
    19 5019;
    20 5020;
}

# Open WebUI (main chat interface)
server {
    listen 80;
    server_name AGENT_DOMAIN;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:5080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }
}

# Claude Code Web (terminal/file access)
server {
    listen 80;
    server_name cc.AGENT_DOMAIN;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }
}

# Subagent bridges (s1.domain - s20.domain)
server {
    listen 80;
    server_name ~^s(?<subid>\d+)\.AGENT_DOMAIN$;

    location / {
        proxy_pass http://127.0.0.1:$subagent_port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }
}
