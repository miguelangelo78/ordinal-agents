[unix_http_server]
file=/var/run/supervisor.sock

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:dockerd]
command=/usr/bin/dockerd --host=unix:///var/run/docker.sock --storage-driver=overlay2
priority=1
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/var/log/supervisor/dockerd.stdout.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/var/log/supervisor/dockerd.stderr.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3

[program:docker-ready]
command=/bin/bash -c "while ! docker info >/dev/null 2>&1; do sleep 1; done; echo 'Docker is ready'"
priority=2
autostart=true
autorestart=false
startsecs=0
startretries=1
stdout_logfile=/var/log/supervisor/docker-ready.stdout.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/var/log/supervisor/docker-ready.stderr.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3

[program:cc-web]
command=/bin/bash -c "while ! docker info >/dev/null 2>&1; do sleep 1; done; exec su -p claude -s /bin/bash -c 'cd /home/claude/workspace && exec cc-web --no-open --port %(ENV_AGENT_BASE_PORT)s --auth %(ENV_CC_WEB_AUTH)s'"
priority=3
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/var/log/supervisor/cc-web.stdout.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/var/log/supervisor/cc-web.stderr.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
environment=HOME="/home/claude"

[program:cc-bridge]
command=/bin/bash -c "while ! docker info >/dev/null 2>&1; do sleep 1; done; exec su -p claude -s /bin/bash -c 'exec node /opt/cc-bridge/index.js'"
priority=4
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/var/log/supervisor/cc-bridge.stdout.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/var/log/supervisor/cc-bridge.stderr.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
environment=HOME="/home/claude",BRIDGE_PORT="4000",BRIDGE_ROLE="main",BRIDGE_MODEL="main-agent",BRIDGE_CWD="/home/claude/workspace"
